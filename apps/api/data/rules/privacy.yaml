- id: privacy.gdpr_transfer_mechanism_missing
  title: Cross-border transfer mechanism is missing
  category: privacy
  severity: high
  frameworks: [gdpr]
  appliesWhen:
    all:
      - anyComplianceGoal: [gdpr]
      - field: privacy.crossBorderTransfers
        equals: true
  condition:
    field: privacy.transferMechanisms
    empty: true
  message: Cross-border transfers are enabled, but no transfer mechanism is recorded.
  recommendation: Document the transfer mechanism used for international personal data transfers, such as SCCs or an applicable adequacy mechanism.
  relatedFields:
    - privacy.crossBorderTransfers
    - privacy.transferMechanisms

- id: privacy.gdpr_privacy_rights_missing
  title: Privacy rights are not configured
  category: privacy
  severity: medium
  frameworks: [gdpr]
  appliesWhen:
    anyComplianceGoal: [gdpr]
  condition:
    field: privacy.supportedRights
    empty: true
  message: Privacy rights are not configured.
  recommendation: Configure the privacy rights your organization supports, such as access, deletion, correction, objection, and portability.
  relatedFields:
    - privacy.supportedRights

- id: privacy.gdpr_request_method_missing
  title: Privacy request method is missing
  category: privacy
  severity: high
  frameworks: [gdpr, ccpa]
  appliesWhen:
    anyComplianceGoal: [gdpr, ccpa]
  condition:
    field: privacy.requestMethods
    empty: true
  message: Privacy request method is missing.
  recommendation: Add at least one way for individuals to submit privacy or data rights requests.
  relatedFields:
    - privacy.requestMethods
    - company.privacyContactEmail

- id: privacy.cookies_tracking_without_consent
  title: Non-essential tracking cookies need stronger consent transparency
  category: privacy
  severity: high
  frameworks: [gdpr, ccpa]
  appliesWhen:
    anyComplianceGoal: [gdpr, ccpa]
  condition:
    any:
      collection: services.all
      where:
        all:
          - field: privacy.usesCookiesOrTrackingTechnologies
            equals: true
          - any:
              collection: privacy.cookieCategories
              where:
                field: requiresConsent
                equals: true
          - any:
              - field: privacy.cookieConsentMechanism
                in: [none, not_defined, not_set]
              - field: privacy.nonEssentialCookiesBlockedUntilConsent
                equals: false
              - field: privacy.cookieConsentWithdrawalMethod
                in: [none, not_defined, not_set]
              - field: privacy.globalPrivacyControlSupported
                equals: false
  message: A service uses non-essential tracking cookies without complete consent transparency.
  recommendation: Confirm the service blocks consent-required cookies until consent, provides a consent mechanism and withdrawal method, and supports Global Privacy Control.
  relatedFields:
    - services.all.privacy.usesCookiesOrTrackingTechnologies
    - services.all.privacy.cookieCategories
    - services.all.privacy.cookieConsentMechanism
    - services.all.privacy.nonEssentialCookiesBlockedUntilConsent
    - services.all.privacy.cookieConsentWithdrawalMethod
    - services.all.privacy.globalPrivacyControlSupported

- id: privacy.response_timeline_undefined
  title: Privacy request timeline is undefined
  category: privacy
  severity: medium
  frameworks: [gdpr, ccpa]
  appliesWhen:
    anyComplianceGoal: [gdpr, ccpa]
  condition:
    field: privacy.responseTimelineDaysStatus
    in: [not_defined, not_set]
  message: The response timeline for privacy requests is explicitly not defined.
  recommendation: Define a response target that supports the statutory timelines that apply to the organization.
  relatedFields:
    - privacy.responseTimelineDaysStatus
    - privacy.responseTimelineDays

- id: privacy.marketing_opt_out_missing
  title: Marketing opt-out is not configured
  category: privacy
  severity: high
  frameworks: [gdpr, ccpa]
  appliesWhen:
    anyComplianceGoal: [gdpr, ccpa]
  condition:
    all:
      - field: privacy.sendsMarketingEmails
        equals: true
      - field: privacy.marketingOptOutMethod
        in: [none, not_defined, not_set]
  message: Marketing emails are sent without a configured opt-out method.
  recommendation: Provide a clear unsubscribe or equivalent opt-out method and honor requests promptly.
  relatedFields:
    - privacy.sendsMarketingEmails
    - privacy.marketingOptOutMethod

- id: privacy.production_data_in_development
  title: Production data is used in development
  category: privacy
  severity: high
  frameworks: [gdpr, soc_2, iso_27001]
  appliesWhen:
    anyComplianceGoal: [gdpr, soc_2, iso_27001]
  condition:
    field: privacy.productionDataInDevelopment
    equals: true
  message: Production customer data is used in development environments.
  recommendation: Use synthetic or anonymized data in development, or apply production-equivalent access, masking, and retention controls.
  relatedFields:
    - privacy.productionDataInDevelopment

- id: privacy.retention_policy_missing
  title: Organization retention policy is missing
  category: privacy
  severity: high
  frameworks: [gdpr, soc_2, iso_27001]
  appliesWhen:
    anyComplianceGoal: [gdpr, soc_2, iso_27001]
  condition:
    field: privacy.retentionPolicyExists
    equals: false
  message: The organization does not have a documented data retention policy.
  recommendation: Document retention and deletion rules for customer, operational, security, and personnel data.
  relatedFields:
    - privacy.retentionPolicyExists
