- id: vendors.processor_dpa_missing
  title: Data processor is missing DPA status
  category: vendors
  severity: high
  frameworks: [gdpr, soc_2, iso_27001]
  appliesWhen:
    anyComplianceGoal: [gdpr, soc_2, iso_27001]
  condition:
    any:
      collection: vendors.dataProcessors
      where:
        all:
          - field: dataProcessingLevel
            in: [limited, subprocessor]
          - field: dpaStatus
            in: [not_started, requested, under_review, unavailable, unknown]
  message: A provider processing customer or user data is missing a signed or not-required DPA status.
  recommendation: Confirm that each provider processing customer or user data has a DPA or equivalent processing terms in place.
  relatedFields:
    - vendors.dataProcessors
