- id: security.development_controls_gap
  title: Development security controls need strengthening
  category: security
  severity: high
  condition:
    any:
      - field: securityProfile.codeReviewRequired
        equals: false
      - field: securityProfile.dependencySecurityMonitoring
        equals: false
      - field: securityProfile.secretScanning
        equals: false
      - field: securityProfile.automatedTestingBeforeDeployment
        equals: false
      - field: securityProfile.cicdDeploymentProcess
        equals: false
      - field: securityProfile.productionDeploymentApprovalRequired
        equals: false
  message: One or more core development security controls are not required.
  recommendation: Require peer review, dependency and secret scanning, automated tests, controlled CI/CD, and approval for production deployments.
  relatedFields:
    - securityProfile.codeReviewRequired
    - securityProfile.dependencySecurityMonitoring
    - securityProfile.secretScanning
    - securityProfile.automatedTestingBeforeDeployment
    - securityProfile.cicdDeploymentProcess
    - securityProfile.productionDeploymentApprovalRequired

- id: security.vulnerability_scanning_missing
  title: Vulnerability scanning is not configured
  category: security
  severity: high
  condition:
    field: security.vulnerabilityManagement.scanningCadence
    in: [none, not_defined, not_set]
  message: Vulnerability scanning is not configured.
  recommendation: Configure recurring vulnerability scanning for dependencies, application code, containers, or infrastructure.
  relatedFields:
    - security.vulnerabilityManagement.scanningCadence

- id: security.penetration_testing_missing
  title: Penetration testing is not configured
  category: security
  severity: high
  condition:
    field: securityProfile.penetrationTestingStrategy
    in: [none, not_defined, not_set]
  message: No penetration testing strategy is configured.
  recommendation: Establish a proportionate internal, external, or continuous penetration testing approach for production systems.
  relatedFields:
    - securityProfile.penetrationTestingStrategy
    - securityProfile.penetrationTestingCadence

- id: security.critical_patch_sla_missing
  title: Critical vulnerability patch timeline is undefined
  category: security
  severity: high
  condition:
    field: securityProfile.patchingSlaCriticalDaysStatus
    in: [not_defined, not_set]
  message: A fix timeline for critical vulnerabilities is explicitly not defined.
  recommendation: Define and document a maximum remediation timeline for critical vulnerabilities.
  relatedFields:
    - securityProfile.patchingSlaCriticalDaysStatus
    - securityProfile.patchingSlaCriticalDays

- id: security.high_patch_sla_missing
  title: High-severity vulnerability patch timeline is undefined
  category: security
  severity: medium
  condition:
    field: securityProfile.patchingSlaHighDaysStatus
    in: [not_defined, not_set]
  message: A fix timeline for high-severity vulnerabilities is explicitly not defined.
  recommendation: Define and document a maximum remediation timeline for high-severity vulnerabilities.
  relatedFields:
    - securityProfile.patchingSlaHighDaysStatus
    - securityProfile.patchingSlaHighDays

- id: security.disclosure_program_missing
  title: Responsible disclosure is not supported
  category: security
  severity: low
  condition:
    field: securityProfile.vulnerabilityDisclosureProgramExists
    equals: false
  message: The organization does not have a responsible vulnerability disclosure program.
  recommendation: Publish a security contact or lightweight disclosure policy so researchers can report vulnerabilities safely.
  relatedFields:
    - securityProfile.vulnerabilityDisclosureProgramExists
    - securityProfile.vulnerabilityDisclosureUrl

- id: security.incident_response_plan_missing
  title: Incident response plan is missing
  category: security
  severity: high
  condition:
    field: security.incidentResponse.planExists
    equals: false
  message: Incident response plan is missing.
  recommendation: Create a lightweight incident response plan covering triage, ownership, communication, and customer notification.
  relatedFields:
    - security.incidentResponse.planExists

- id: security.incident_notification_gap
  title: Incident notification process needs strengthening
  category: security
  severity: high
  condition:
    all:
      - field: security.incidentResponse.planExists
        equals: true
      - any:
          - field: securityProfile.incidentNotificationTimeline
            in: [none, not_defined, not_set]
          - field: securityProfile.customerNotificationProcess
            empty: true
          - field: securityProfile.customerNotificationProcess
            includesAny: [none, not_defined, not_set]
  message: The incident response plan lacks a defined notification timeline or customer notification process.
  recommendation: Define when incidents must be escalated and how affected customers and regulators will be notified.
  relatedFields:
    - securityProfile.incidentNotificationTimeline
    - securityProfile.customerNotificationProcess

- id: security.shared_accounts_exist
  title: Shared accounts are in use
  category: access
  severity: high
  condition:
    field: access.sharedAccountsExist
    equals: true
  message: Shared accounts are in use.
  recommendation: Replace shared accounts with named user accounts and enforce individual authentication.
  relatedFields:
    - access.sharedAccountsExist
