name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-web.yml"
      - ".firebaserc"
      - "firebase.json"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || 'plyco-prod' }}

jobs:
  deploy:
    name: Build and deploy web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          PUBLIC_API_URL: ${{ vars.API_PUBLIC_URL }}
        run: pnpm --filter cf-web build

      - name: Deploy web to Firebase Hosting
        uses: w9jds/firebase-action@v15.22.3
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_DEPLOY_SERVICE_ACCOUNT_JSON }}
          PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
        with:
          args: deploy --only hosting:web --project ${{ env.FIREBASE_PROJECT_ID }} --non-interactive

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@v1.0.1
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Deployment Status: ${{ job.status }}
            App: Web App
            Workflow: ${{ github.workflow }}
            
            Commit: ${{ github.event.head_commit.message || github.sha }}
            Author: ${{ github.actor }}
            
            See changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
