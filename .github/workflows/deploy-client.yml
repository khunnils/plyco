name: Deploy Client

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-client.yml"
      - ".firebaserc"
      - "firebase.json"
      - "apps/client/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || 'plyco-prod' }}

jobs:
  deploy:
    name: Build and deploy client
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @plyco/shared build

      - name: Typecheck shared package
        run: pnpm --filter @plyco/shared typecheck

      - name: Test shared package
        run: pnpm --filter @plyco/shared test

      - name: Typecheck client
        run: pnpm --filter cf-app typecheck

      - name: Test client
        run: pnpm --filter cf-app test

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Build client
        run: |
          set -euo pipefail
          VITE_API_URL="${{ vars.VITE_API_URL }}" \
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN="${{ vars.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}" \
          VITE_PUBLIC_POSTHOG_HOST="${{ vars.VITE_PUBLIC_POSTHOG_HOST }}" \
          VITE_UI_POSTHOG_HOST="${{ vars.VITE_UI_POSTHOG_HOST }}" \
          NODE_ENV=production pnpm --filter cf-app build

      - name: Deploy client to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail
          pnpm exec firebase deploy \
            --only hosting:client \
            --project "${FIREBASE_PROJECT_ID}" \
            --non-interactive

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@v1.0.1
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Deployment Status: ${{ job.status }}
            App: Client App
            Workflow: ${{ github.workflow }}
            
            Commit: ${{ github.event.head_commit.message || github.sha }}
            Author: ${{ github.actor }}
            
            See changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
